    <path d="M9 47 L1 47" stroke="#FFD84D" stroke-width="2" stroke-linecap="round" opacity="0.75" />
    <path d="M77 36 L84 33 L79 39" stroke="#FFD84D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" />

