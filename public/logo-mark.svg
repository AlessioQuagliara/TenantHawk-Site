<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 110" fill="none" role="img" aria-labelledby="title desc">
  <title id="title">TenantHawk Mark</title>
  <desc id="desc">Stylized hawk mark for TenantHawk without background.</desc>
  <defs>
    <linearGradient id="mark-yellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE866" />
      <stop offset="55%" stop-color="#FFD84D" />
      <stop offset="100%" stop-color="#FFB800" />
    </linearGradient>
    <linearGradient id="mark-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1C2233" />
